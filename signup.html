<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />                                                                                                                                                                                                                                                                
    <title>Sign Up - Metropolitan Mountaineering Society</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>
<div class="auth-bg"></div>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 18 L12 6 L21 18" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 18 L12 11 L17 18" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <span class="auth-logo-text">MMS</span>
        </div>
        <h1 class="auth-title">Join MMS</h1>
        <p class="auth-subtitle">Create an account to start yout adventure</p>
        <div class="auth-error" id="signupError"></div>
        <div class="auth-success" id="signupSuccess"></div>

        <div class="auth-field">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Juan Dela Cruz" autocomplete="name" />
        </div>

        <div class="auth-field">
            <label>Email</label>
            <input type="email" id="email" placeholder="juan@example.com" autocomplete="email" />
        </div>

        <div class="auth-field">
            <label>Username</label>
            <input type="text" id="username" placeholder="Choose a username" autocomplete="username" />
        </div>

        <div class="auth-field">
            <label>Password</label>
            <div class="auth-password-wrap">
                <input type="password" id="password" placeholder="Create a password" autocomplete="new-password" />
                <button type="button" class="auth-toggle-pw" id="togglePw">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="2"/></svg>
                </button>
            </div>
        </div>

        <div class="auth-field">
            <label>Confirm Password</label>
            <div class="auth-password-wrap">
                <input type="password" id="confirmPassword" placeholder="Confirm your password" autocomplete="new-password" />
                <button type="button" class="auth-toggle-ow" id="toggleConfirmPw">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>

        <button type="button" class="auth-btn" id="signupBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                Create Account
        </button>

        <div class="auth-divider"></div>
        <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
    </div>
</div>

<script src="js/auth-s.js"></script>
<script src="js/signup.js"></script>
</body>
</html>
