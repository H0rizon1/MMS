<!DOCTYPE html>
<html lang="en">                                                                                                                                                                                                                                                                                                                                                            
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Open Climbs - MMS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>

<div class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon">
                <svg viewBox="0 0 24 24"><path d="M3 18 L12 6 L21 18" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 18 L12 11 L17 18" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div>
                <div class="sidebar-brand-name">MMS Admin</div>
                <div class="sidebar-brand-sub">Dashboard</div>
            </div>
        </div>
        <div class="sidebar-admin">
            <div class="sidebar-admin-avatar">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke-linecap="round"/></svg>
            </div>
            <div>
                <div class="sidebar-admin-name" id="adminName">Jena Ruanes</div>
                <div class="sidebar-admin-role">Administrator</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7"
                    height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Dashboard
            </a>
            <a href="openclimbs.html" class="sidebar-link active">
                <svg viewBox="0 0 24 24"><path d="M3 18 L12 5 L21 18" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Open Climbs
            </a>
            <a href="participants.html" class="sidebar-link">
                <svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="3"/><path d="M3 20c0-3 2.7-5 6-5s6 2 6 5"/><circle cx="17" cy="7" r="3"/><path d="M17 12c2.7 0 5 2 5 5"/></svg>
                Participants
            </a>
        </nav>
        <div class="sidebar-logout">
            <button class="sidebar-logout-btn" id="logoutBtn">
                <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Logout
            </button>
        </div>
    </aside>

    <main class="admin-main">
        <div class="admin-page-header">
            <div>
                <h1 class="admin-page-title">Open Climbs Management</h1>
                <p class="admin-page-sub">Manage All your climbing events</p>
            </div>
            <button class="btn-primary" id="createClimbBtn">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Create New Climb
            </button>
        </div>
        <div class="admin-climbs-grid" id="climbsGrid"></div>
    </main>
</div>

<div class="modal-overlay" id="climbModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="climbModalTitle">Create New Climb</h2>
            <button class="modal-close" id="closeClimbModal">
                <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-field">
                <label>Mountain Name</label>
                <input type="text" id="fieldName" placeholder="Mt. Example" />
            </div>
            <div class="form-row">
                <div class="form-field">
                    <label>Difficulty</label>
                    <input type="text" id="fieldDifficulty" placeholder="5/9" />
                </div>
                <div class="form-field">
                    <label>Elevation</label>
                    <input type="text", id="fieldElevation" placeholder="1,000 MASL"/>
                </div>
            </div>
            <div class="form-field">
                <label>Location</label>
                <input type="text" id="fieldLocation" placeholder="Province" />
            </div>
            <div class="form-field">
                <label>Schedule</label>
                <input type="text" id="fieldSchedule" placeholder="June 15-16, 2026"/>
            </div>
            <div class="form-field">
                <label>Participant Limit</label>
                <input type="number" id="fieldLimit" placeholder="20" />
            </div>
            <div class="form-field">
                <label>Description</label>
                <textarea id="fieldDesc" placeholder="Dsecribe the climb..."></textarea>
            </div>
            <button class="btn-primary" id="savedClimbBtn" style="width: 100%;justify-content: center;">Create Climb</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="paticipantsModal">
    <div class="modal modal-lg">
        <div class="modal-header">
            <h2 id="participantsModalTitle">Participants</h2>
            <button class="modal-close" id="closeParticipantsModal">
                <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/></svg>
            </button>
        </div>
        <div class="modal-body" id="participantsModalBody"></div>
    </div>
</div>

<script src="../js/auth-s.js"></script>
<script src="js/admin.js"></script>
<script src="js/openclimbs.js"></script>
</body>
</html>
