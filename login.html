<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />                                                                                                                                                                                                                     
    <title>Login - Metropolitan Mountaineering Society</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>

<div class="auth-bg"></div>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 18 L12 6 L21 18" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 18 L12 11 L17 18" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <span class="auth-logo-text">MMS</span>
        </div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Login to access your account</p>
        <div class="auth-error" id="loginError"></div>
        <div class="auth-field">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
        </div>
        <div class="auth-field">
            <label>Password</label>
            <div class="auth-password-wrap">
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
                <button type="button" class="auth-toggle-pw" id="togglePw">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>
        <div class="auth-options">
            <label class="auth-remember">
                <input type="checkbox" id="remember"/>
                <span>Remember Me</span>
            </label>
            <button type="button" class="auth-forget" id="forgotBtn">Forgot Password?</button>
        </div>
        <button type="button" class="auth-btn" id="loginBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Login
        </button>
        <div class="auth-divider"></div>
        <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>

        <div class="auth-demo">
            <div class="auth-demo-title">Demo Accounts:</div>
            <div class="auth-demo-item">Admin: Jena Ruanes | Admin123</div>
            <div class="auth-demo-item">user: Desiree Lagman | User123</div>
        </div>
    </div>
</div>

<script src="js/auth-s.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
